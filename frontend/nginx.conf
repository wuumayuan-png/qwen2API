upstream qwen2api_backend {
    server backend:7860;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;

    location /api/ { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /v1/ { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /anthropic/ { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /v1beta/ { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }

    location /chat/ { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /messages { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /models/ { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /embeddings { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /images/ { proxy_pass http://qwen2api_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }

    location = /healthz { proxy_pass http://qwen2api_backend; }
    location = /readyz { proxy_pass http://qwen2api_backend; }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
